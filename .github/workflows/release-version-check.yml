name: Release Version Check

on:
  release:
    types:
      - published

jobs:
  validate-package-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate package.json version against release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          if [ -z "${RELEASE_TAG:-}" ]; then
            echo "::error::Release tag not found in workflow context."
            exit 1
          fi

          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "Release tag: ${RELEASE_TAG}"
          echo "Tag version: ${TAG_VERSION}"
          echo "package.json version: ${PACKAGE_VERSION}"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "::error::Version mismatch: release tag '${RELEASE_TAG}' does not match package.json version '${PACKAGE_VERSION}'."
            exit 1
          fi

          echo "Version check passed."
